<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FB SHARE PRO</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>

<style>
body {
    background: radial-gradient(circle at top, #1e293b, #020617);
}
.glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
}
.glow {
    box-shadow: 0 0 30px rgba(99,102,241,0.4);
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 text-white">

<div id="app" class="w-full max-w-[600px] glass rounded-3xl p-6 shadow-2xl">

    <!-- HEADER -->
    <div class="text-center mb-6">
        <h1 class="text-4xl font-extrabold bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-500 bg-clip-text text-transparent tracking-wide">
            <i class="fas fa-bolt"></i> FB SHARE PRO
        </h1>
        <p class="text-slate-400 text-sm mt-2">Fast • Modern • Powerful</p>
    </div>

    <!-- FORM -->
    <div class="space-y-4">

        <input v-model="form.url" @keyup.enter="startSharing"
        class="w-full p-3 rounded-xl bg-black/30 border border-white/10 focus:ring-2 focus:ring-cyan-400 outline-none"
        placeholder="🔗 Facebook Post URL">

        <textarea v-model="form.cookie"
        class="w-full p-3 rounded-xl bg-black/30 border border-white/10 focus:ring-2 focus:ring-cyan-400 outline-none font-mono"
        placeholder="🍪 Paste your cookie"></textarea>

        <div class="grid grid-cols-3 gap-3">
            <input type="number" v-model.number="form.amount" class="p-3 rounded-xl bg-black/30 border border-white/10" placeholder="Amount">
            <input type="number" v-model.number="form.interval" class="p-3 rounded-xl bg-black/30 border border-white/10" placeholder="Interval">
            <input type="number" v-model.number="form.threads" class="p-3 rounded-xl bg-black/30 border border-white/10" placeholder="Threads">
        </div>

    </div>

    <!-- BUTTON -->
    <button @click="startSharing" :disabled="isProcessing"
    class="w-full mt-6 py-4 rounded-xl bg-gradient-to-r from-cyan-500 to-purple-500 font-bold text-lg glow hover:scale-105 transition">
        <span v-if="!isProcessing">🚀 START</span>
        <span v-else>⏳ PROCESSING...</span>
    </button>

    <!-- STATS -->
    <div class="grid grid-cols-3 gap-3 mt-6 text-center">
        <div class="glass p-3 rounded-xl">
            <p class="text-green-400 text-sm">SUCCESS</p>
            <h2 class="text-xl font-bold">{{ stats.success }}</h2>
        </div>
        <div class="glass p-3 rounded-xl">
            <p class="text-blue-400 text-sm">PROGRESS</p>
            <h2 class="text-xl font-bold">{{ stats.progress }}</h2>
        </div>
        <div class="glass p-3 rounded-xl">
            <p class="text-red-400 text-sm">ERROR</p>
            <h2 class="text-xl font-bold">{{ stats.error }}</h2>
        </div>
    </div>

    <!-- LOGS -->
    <div class="mt-6 glass p-4 rounded-xl h-48 overflow-y-auto text-xs font-mono">
        <div v-for="(log, index) in logs" :key="index" class="mb-1">
            [{{ log.time }}] {{ log.message }}
        </div>
        <div v-if="logs.length === 0" class="text-center text-slate-500">No logs yet...</div>
    </div>

</div>

<script>
new Vue({
    el: '#app',
    data: {
        form: {
            url: '',
            cookie: '',
            amount: 100,
            interval: 0,
            threads: 1
        },
        isProcessing: false,
        logs: [],
        stats: { success: 0, error: 0, progress: 0 }
    },

    methods: {
        addLog(msg) {
            const time = new Date().toLocaleTimeString();
            this.logs.push({ time, message: msg });
        },

        async startSharing() {
            if (!this.form.url || !this.form.cookie) {
                this.addLog('❌ Missing input');
                return;
            }

            this.isProcessing = true;
            this.logs = [];
            this.stats = { success: 0, error: 0, progress: 0 };

            try {
                const res = await fetch('https://oreo.gleeze.com/api/fbshare', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'text/event-stream'
                    },
                    body: JSON.stringify({
                        postUrl: this.form.url,
                        cookie: this.form.cookie,
                        shareAmount: this.form.amount,
                        intervalSeconds: this.form.interval,
                        threads: this.form.threads,
                        stream: true
                    })
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const msgs = buffer.split('\n\n');
                    buffer = msgs.pop();

                    for (const msg of msgs) {
                        if (msg.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(msg.slice(6));
                                if (data.status === 'completed') {
                                    this.stats.success++;
                                    this.addLog('✅ success');
                                } else if (data.status === 'error') {
                                    this.stats.error++;
                                    this.addLog('❌ error');
                                } else if (data.status === 'progress') {
                                    const match = data.message.match(/(\d+)/);
                                    if (match) this.stats.progress = match[1];
                                }
                            } catch {}
                        }
                    }
                }

                this.addLog('✅ Done');

            } catch (e) {
                this.addLog('❌ Connection error');
            }

            this.isProcessing = false;
        }
    }
});
</script>

</body>
    </html>
